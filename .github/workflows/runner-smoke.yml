name: Runner smoke

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Confirm GitHub-hosted runner
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print runner confirmation
        run: echo "GitHub-hosted runner is available"

